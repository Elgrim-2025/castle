<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>무한성 입구 AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Noto Sans KR', sans-serif; }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      color: #fff;
    }
    #overlay h1 { font-size: 1.6rem; margin-bottom: 12px; letter-spacing: 2px; }
    #overlay p  { font-size: 0.95rem; opacity: 0.8; margin-bottom: 28px; text-align:center; padding:0 20px; }
    #startBtn {
      padding: 14px 36px;
      font-size: 1.1rem;
      border: 2px solid #ff4444;
      background: transparent;
      color: #ff4444;
      border-radius: 40px;
      cursor: pointer;
      transition: all .2s;
    }
    #startBtn:hover { background: #ff4444; color: #fff; }

    #hint {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #fff;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.5);
      padding: 10px 22px;
      border-radius: 20px;
      display: none;
      text-align: center;
    }

    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #video-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    canvas { position: fixed; top:0; left:0; z-index: 1; }
  </style>
</head>
<body>

<div id="overlay">
  <h1>⛩ 무한성 입구</h1>
  <p>카메라로 바닥을 천천히 비추면<br>무한성의 입구가 열립니다.</p>
  <button id="startBtn">시작하기</button>
</div>

<div id="hint">바닥을 향해 카메라를 비춰주세요...</div>

<!-- 카메라 영상 배경 -->
<video id="video-bg" autoplay playsinline muted></video>

<canvas id="glCanvas"></canvas>

<!-- AR에 표시할 영상 (숨김) -->
<video id="arVideo" src="무한성입구.mp4" loop muted playsinline
       crossorigin="anonymous" style="display:none"></video>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const overlay  = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const hint     = document.getElementById('hint');
const videoBg  = document.getElementById('video-bg');
const arVideo  = document.getElementById('arVideo');
const canvas   = document.getElementById('glCanvas');

// ─── 렌더러 ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;

// ─── 씬 / 카메라 ─────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.01, 100);
scene.add(camera);

// 환경광
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

// ─── 비디오 텍스처 메시 ────────────────────────────────────
const videoTex = new THREE.VideoTexture(arVideo);
videoTex.minFilter = THREE.LinearFilter;
videoTex.magFilter = THREE.LinearFilter;
videoTex.format    = THREE.RGBAFormat;

// 크기 8 (단위: AR 미터)
const GEO_SIZE = 2;
const geo  = new THREE.PlaneGeometry(GEO_SIZE, GEO_SIZE * (9/16));
const mat  = new THREE.MeshBasicMaterial({ map: videoTex, side: THREE.DoubleSide });
const mesh = new THREE.Mesh(geo, mat);
mesh.rotation.x = -Math.PI / 2;   // 바닥에 눕힘
mesh.visible = false;
scene.add(mesh);

// 바닥 감지 링 애니메이션
const ringGeo = new THREE.RingGeometry(0.08, 0.12, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xff4444, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
const ring    = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.visible = false;
scene.add(ring);

// ─── WebXR Hit-Test (바닥 인식) ────────────────────────────
let xrSession   = null;
let hitTestSrc  = null;
let localFloor  = null;
let placed      = false;

// WebXR 지원 확인
const xrSupported = navigator.xr
  ? await navigator.xr.isSessionSupported('immersive-ar').catch(() => false)
  : false;

// ─── 폴백: 비-WebXR 모드 (데스크톱 / 미지원 기기) ─────────────
async function startFallback() {
  // 카메라 스트림을 배경으로
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    videoBg.srcObject = stream;
    videoBg.style.display = 'block';
  } catch {
    videoBg.style.display = 'none';
  }

  hint.textContent = '📱 화면을 탭하면 영상이 바닥에 배치됩니다';
  hint.style.display = 'block';

  // 탭하면 메시를 카메라 앞 3m 바닥에 배치
  canvas.addEventListener('click', () => {
    if (placed) return;
    placeVideo(new THREE.Vector3(0, -1.5, -3));
  });

  // 간단한 렌더 루프
  renderer.setAnimationLoop(() => {
    ring.rotation.z += 0.01;
    renderer.render(scene, camera);
  });
}

// ─── WebXR AR 모드 ────────────────────────────────────────
async function startAR() {
  xrSession = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test', 'local-floor'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.body }
  });

  renderer.xr.setReferenceSpaceType('local-floor');
  await renderer.xr.setSession(xrSession);

  localFloor = await xrSession.requestReferenceSpace('local-floor');
  const viewerSpace = await xrSession.requestReferenceSpace('viewer');
  hitTestSrc  = await xrSession.requestHitTestSource({ space: viewerSpace });

  hint.textContent = '📱 바닥을 향해 카메라를 비추고 탭하세요';
  hint.style.display = 'block';
  ring.visible = true;

  // 탭하면 배치
  xrSession.addEventListener('select', () => {
    if (!placed && ring.visible) {
      placeVideo(ring.position.clone());
    }
  });

  renderer.setAnimationLoop((time, frame) => {
    if (!frame) return;

    // Hit-test 결과로 링 위치 업데이트
    const hits = frame.getHitTestResults(hitTestSrc);
    if (hits.length > 0) {
      const pose = hits[0].getPose(localFloor);
      if (pose) {
        ring.visible = true;
        ring.position.set(
          pose.transform.position.x,
          pose.transform.position.y,
          pose.transform.position.z
        );
      }
    } else {
      ring.visible = placed ? false : true;
    }

    ring.rotation.z += 0.01;
    renderer.render(scene, camera);
  });
}

// ─── 배치 공통 함수 ───────────────────────────────────────
function placeVideo(pos) {
  placed = true;
  ring.visible = false;
  mesh.position.copy(pos);
  mesh.visible = true;
  hint.textContent = '✅ 무한성의 입구가 열렸습니다!';
  setTimeout(() => { hint.style.display = 'none'; }, 3000);

  arVideo.muted = false;
  arVideo.play().catch(() => { arVideo.muted = true; arVideo.play(); });
}

// ─── 시작 버튼 ────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  overlay.style.display = 'none';

  if (xrSupported) {
    await startAR();
  } else {
    await startFallback();
  }
});

// ─── 리사이즈 ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
